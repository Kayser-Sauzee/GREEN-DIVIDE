<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
        <link rel="stylesheet" href="css/L.Control.Locate.min.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link rel="stylesheet" href="css/leaflet.photon.css">
        <style>
            html, body, #map {
                width: 100%;
                height: 100%;
                padding: 0;
                margin: 0;
            }
            /* Animation pour le symbole pulsant */
            @keyframes pulse {
                0% { transform: scale(1); opacity: 1; }
                50% { transform: scale(1.2); opacity: 0.8; }
                100% { transform: scale(1); opacity: 1; }
            }
            .pulse-icon {
                animation: pulse 1.5s infinite;
            }
            /* Style pour la flèche de direction */
            .direction-arrow {
                width: 30px;
                height: 30px;
                background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%230000FF"><path d="M12 2L13.09 8.26L20 9L13.09 9.74L12 16L10.91 9.74L4 9L10.91 8.26L12 2Z"/></svg>');
                background-size: contain;
                background-repeat: no-repeat;
                background-position: center;
                transform-origin: center;
            }
        </style>
        <title>PERIPLE GREEN DIVIDE DE BÂTARD</title>
    </head>
    <body>
        <div id="map"></div>
        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.min.js"></script>
        <script src="js/L.Control.Locate.min.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/leaflet.pattern.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="js/leaflet.photon.js"></script>
        <script src="data/PART1_3.js"></script>
        <script src="data/FIN_J1_4.js"></script>
        <script src="data/DEBUT_J2tracks_5.js"></script>
        <script src="data/J2_PART1_6.js"></script>
        <script src="data/J2_PART2_7.js"></script>
        <script src="data/FIN_J2tracks_8.js"></script>
        <script src="data/DEBUT_J3tracks_9.js"></script>
        <script src="data/J3_PART1_10.js"></script>
        <script src="data/J3_PART2_11.js"></script>
        <script src="data/FIN_J3tracks_12.js"></script>
        <script src="data/DEBUT_J4tracks_13.js"></script>
        <script src="data/J4_PART1_14.js"></script>

        <script>
            // --- Initialisation de la carte (inchangé) ---
            var map = L.map('map', {
                zoomControl: false,
                maxZoom: 28,
                minZoom: 1
            }).fitBounds([[52.3338677416436, 5.769030974363743], [52.337291678495006, 5.777546303180019]]);
            var hash = new L.Hash(map);
            map.attributionControl.setPrefix('<a href="https://github.com/qgis2web/qgis2web" target="_blank">qgis2web</a> &middot; <a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a> &middot; <a href="https://qgis.org">QGIS</a>');

            // --- Fonctions existantes (inchangées) ---
            var autolinker = new Autolinker({ truncate: { length: 30, location: 'smart' } });
            function removeEmptyRowsFromPopupContent(content, feature) { /* ... */ }
            function addClassToPopupIfMedia(content, popup) { /* ... */ }

            // --- Ajout des couches de tuiles (inchangé) ---
            map.createPane('pane_WazeWorld_0');
            map.getPane('pane_WazeWorld_0').style.zIndex = 400;
            var layer_WazeWorld_0 = L.tileLayer('https://worldtiles3.waze.com/tiles/{z}/{x}/{y}.png', {
                pane: 'pane_WazeWorld_0',
                opacity: 1.0,
                attribution: '',
                minZoom: 1,
                maxZoom: 28,
                minNativeZoom: 0,
                maxNativeZoom: 20
            });
            map.addLayer(layer_WazeWorld_0);

            map.createPane('pane_GoogleRoad_1');
            map.getPane('pane_GoogleRoad_1').style.zIndex = 401;
            var layer_GoogleRoad_1 = L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
                pane: 'pane_GoogleRoad_1',
                opacity: 1.0,
                attribution: '<a href="https://www.google.at/permissions/geoguidelines/attr-guide.html">Map data ©2015 Google</a>',
                minZoom: 1,
                maxZoom: 28,
                minNativeZoom: 0,
                maxNativeZoom: 20
            });
            map.addLayer(layer_GoogleRoad_1);

            map.createPane('pane_OpenStreetMap_2');
            map.getPane('pane_OpenStreetMap_2').style.zIndex = 402;
            var layer_OpenStreetMap_2 = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
                pane: 'pane_OpenStreetMap_2',
                opacity: 1.0,
                attribution: '',
                minZoom: 1,
                maxZoom: 28,
                minNativeZoom: 0,
                maxNativeZoom: 19
            });
            map.addLayer(layer_OpenStreetMap_2);

            // --- Ajout des couches GeoJSON (inchangé) ---
            // (Toutes les fonctions pop_* et style_* restent identiques)
            // ...

            // --- NOUVELLE PARTIE : Géolocalisation personnalisée ---
            // 1. Désactive le contrôle de géolocalisation par défaut
            // L.control.locate({ locateOptions: { maxZoom: 19 } }).addTo(map); // <-- Commenté

            // 2. Crée une icône personnalisée pour le marqueur de géolocalisation
            var bluePulseIcon = L.divIcon({
                className: 'pulse-icon',
                html: '<div style="width: 24px; height: 24px; background-color: #0000FF; border-radius: 50%; border: 3px solid #FFFFFF; box-shadow: 0 0 10px #0000FF;"></div>',
                iconSize: [24, 24],
                iconAnchor: [12, 12]
            });

            // 3. Crée une icône pour la flèche de direction
            var directionArrowIcon = L.divIcon({
                className: 'direction-arrow',
                iconSize: [30, 30],
                iconAnchor: [15, 15]
            });

            // 4. Variables pour suivre la position et la direction
            var currentMarker = null;
            var currentArrow = null;
            var previousLatLng = null;
            var watchId = null;

            // 5. Fonction pour mettre à jour la position et la direction
            function updateLocation(position) {
                var lat = position.coords.latitude;
                var lng = position.coords.longitude;
                var accuracy = position.coords.accuracy;
                var newLatLng = L.latLng(lat, lng);

                // Si le marqueur n'existe pas, le créer
                if (!currentMarker) {
                    currentMarker = L.marker(newLatLng, {
                        icon: bluePulseIcon,
                        zIndexOffset: 1000
                    }).addTo(map);

                    // Centrer la carte sur la position initiale
                    map.setView(newLatLng, 17);
                } else {
                    // Mise à jour fluide de la position
                    currentMarker.setLatLng(newLatLng);
                }

                // Si une flèche existe, la supprimer
                if (currentArrow) {
                    map.removeLayer(currentArrow);
                }

                // Si on a une position précédente, calculer la direction
                if (previousLatLng) {
                    var angle = previousLatLng.bearingTo(newLatLng);
                    currentArrow = L.marker(newLatLng, {
                        icon: directionArrowIcon,
                        rotationAngle: angle,
                        rotationOrigin: 'center center',
                        zIndexOffset: 1001
                    }).addTo(map);
                }

                // Mettre à jour la position précédente
                previousLatLng = newLatLng;
            }

            // 6. Fonction pour démarrer la géolocalisation
            function startGeolocation() {
                if (navigator.geolocation) {
                    // Arrêter la surveillance précédente si elle existe
                    if (watchId) {
                        navigator.geolocation.clearWatch(watchId);
                    }

                    // Démarrer une nouvelle surveillance
                    watchId = navigator.geolocation.watchPosition(
                        updateLocation,
                        function(error) {
                            console.error("Erreur de géolocalisation : ", error);
                        },
                        {
                            enableHighAccuracy: true,
                            maximumAge: 0,
                            timeout: 5000
                        }
                    );
                } else {
                    alert("La géolocalisation n'est pas supportée par votre navigateur.");
                }
            }

            // 7. Fonction pour arrêter la géolocalisation
            function stopGeolocation() {
                if (watchId) {
                    navigator.geolocation.clearWatch(watchId);
                    watchId = null;
                }
                if (currentMarker) {
                    map.removeLayer(currentMarker);
                    currentMarker = null;
                }
                if (currentArrow) {
                    map.removeLayer(currentArrow);
                    currentArrow = null;
                }
                previousLatLng = null;
            }

            // 8. Ajouter un bouton pour activer/désactiver la géolocalisation
            var locateControl = L.control({
                position: 'topleft'
            });
            locateControl.onAdd = function(map) {
                var div = L.DomUtil.create('div', 'leaflet-control-locate leaflet-bar leaflet-control');
                div.innerHTML = '<a href="#" class="leaflet-control-locate-button" title="Activer la géolocalisation">📍</a>';
                div.onclick = function() {
                    if (!watchId) {
                        startGeolocation();
                        div.innerHTML = '<a href="#" class="leaflet-control-locate-button active" title="Désactiver la géolocalisation">📍</a>';
                    } else {
                        stopGeolocation();
                        div.innerHTML = '<a href="#" class="leaflet-control-locate-button" title="Activer la géolocalisation">📍</a>';
                    }
                    return false;
                };
                return div;
            };
            locateControl.addTo(map);

            // 9. Ajouter les couches GeoJSON (inchangé)
            // (Toutes les couches comme layer_PART1_3, layer_FIN_J1_4, etc.)
            // ...

            // 10. Ajout des contrôles existants (inchangé)
            var title = new L.Control({ 'position': 'topright' });
            title.onAdd = function(map) { /* ... */ };
            title.addTo(map);

            var abstract = new L.Control({ 'position': 'topright' });
            abstract.onAdd = function(map) { /* ... */ };
            abstract.addTo(map);

            var zoomControl = L.control.zoom({
                position: 'topleft'
            }).addTo(map);

            // 11. Ajout des overlays (inchangé)
            var overlaysTree = [ /* ... */ ];
            var lay = L.control.layers.tree(null, overlaysTree, {
                collapsed: true,
            });
            lay.addTo(map);

            // 12. Initialisation des bounds (inchangé)
            function setBounds() { /* ... */ }
            setBounds();
        </script>
    </body>
</html>
