        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }

        /* ── Géolocalisation : point bleu pulsant + flèche ── */
        .geoloc-wrapper {
            position: relative;
            width: 0;
            height: 0;
            /* Le wrapper est centré sur la coordonnée GPS */
        }

        /* Halo pulsant externe */
        .geoloc-pulse {
            position: absolute;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(30, 136, 229, 0.25);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: pulse 2s ease-out infinite;
            pointer-events: none;
        }

        /* Deuxième halo décalé pour effet double pulse */
        .geoloc-pulse2 {
            position: absolute;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(30, 136, 229, 0.15);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: pulse 2s ease-out infinite 0.7s;
            pointer-events: none;
        }

        @keyframes pulse {
            0%   { width: 20px; height: 20px; opacity: 0.8; }
            100% { width: 60px; height: 60px; opacity: 0; }
        }

        /* Point bleu central */
        .geoloc-dot {
            position: absolute;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #1E88E5;
            border: 3px solid #fff;
            box-shadow: 0 0 0 2px rgba(30,136,229,0.5), 0 2px 8px rgba(0,0,0,0.4);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        /* Conteneur de la flèche — tourne autour du centre du point */
        .geoloc-arrow-container {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            transform-origin: 0 0;
            /* la rotation est appliquée via JS */
            pointer-events: none;
            transition: transform 0.4s ease;
        }

        /* La flèche elle-même, positionnée au-dessus du point */
        .geoloc-arrow {
            position: absolute;
            width: 0;
            height: 0;
            /* Triangle SVG-like avec border */
            border-left: 7px solid transparent;
            border-right: 7px solid transparent;
            border-bottom: 16px solid #1E88E5;
            filter: drop-shadow(0 1px 3px rgba(0,0,0,0.4));
            /* Centre horizontal, décalé vers le haut (au-delà du rayon du point) */
            left: -7px;
            top: -30px;
        }
        /* Pointe blanche sur la flèche */
        .geoloc-arrow::after {
            content: '';
            position: absolute;
            width: 0;
            height: 0;
            border-left: 4px solid transparent;
            border-right: 4px solid transparent;
            border-bottom: 10px solid #fff;
            left: -4px;
            top: 6px;
        }

        /* Masquée par défaut, affichée quand le cap est connu */
        .geoloc-arrow-container.hidden {
            display: none;
        }
        </style>

        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;

        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);

                    popup._contentNode.classList.remove('media');

        // Calcul du cap entre deux points (en degrés, 0 = Nord)
        function computeBearing(lat1, lng1, lat2, lng2) {
            var dLng = (lng2 - lng1) * Math.PI / 180;
            var rlat1 = lat1 * Math.PI / 180;
            var rlat2 = lat2 * Math.PI / 180;
            var y = Math.sin(dLng) * Math.cos(rlat2);
            var x = Math.cos(rlat1) * Math.sin(rlat2) -
                    Math.sin(rlat1) * Math.cos(rlat2) * Math.cos(dLng);
            var brng = Math.atan2(y, x) * 180 / Math.PI;
            return (brng + 360) % 360;
        }

        function onGeolocSuccess(pos) {
            var lat = pos.coords.latitude;
            var lng = pos.coords.longitude;
            var heading = pos.coords.heading; // null si non disponible

            // Crée le marker au premier fix
            if (!geolocMarker) {
                geolocMarker = L.marker([lat, lng], {
                    icon: geolocIcon,
                    zIndexOffset: 1000,
                    interactive: false
                }).addTo(map);
            } else {
                // Mise à jour fluide : setLatLng est sans transition native,
                // mais Leaflet repositionne via CSS transform → très fluide
                geolocMarker.setLatLng([lat, lng]);
            }

            // Calcul du cap
            var bearing = null;
            if (heading !== null && !isNaN(heading)) {
                // Le GPS fournit directement le cap
                bearing = heading;
            } else if (lastLat !== null) {
                // Estimation depuis les deux dernières positions
                var dist = map.distance([lastLat, lastLng], [lat, lng]);
                if (dist > 3) { // seuil minimal pour éviter le bruit
                    bearing = computeBearing(lastLat, lastLng, lat, lng);
                }
            }

            // Met à jour la flèche
            var arrowEl = document.getElementById('geoloc-arrow-el');
            if (arrowEl) {
                if (bearing !== null) {
                    arrowEl.classList.remove('hidden');
                    arrowEl.style.transform = 'rotate(' + bearing + 'deg)';
                } else {
                    arrowEl.classList.add('hidden');
                }
            }

            lastLat = lat;
            lastLng = lng;
        }

        function onGeolocError(err) {

                        }

                        btn.style.color = '';
                        btn.innerHTML = '⊕';
                    }
                };
